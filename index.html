<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Aplicação educativa de AR para aprender balanceamento químico de forma interativa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000">
    
    <title>Balanceador Químico AR - Mg + HCl → MgCl₂ + H₂</title>
    
    <!-- A-Frame para renderização 3D/AR -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <!-- MediaPipe para rastreamento de mão -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424926/hands.js" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Câmera Nativa (Vídeo em Tempo Real) -->
    <video id="webcam" autoplay playsinline muted></video>

    <!-- HUD - Interface Superior -->
    <div id="hud-jogo" role="heading" aria-level="1">
        <h2>Balanceador Químico AR</h2>
        <p id="hint-text">Mostre a mão aberta para ver a reação</p>
    </div>

    <!-- Popup de Feedback -->
    <div id="feedback-popup" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- Indicador de Mão Detectada -->
    <div id="hand-indicator" class="hand-indicator">
        <div class="indicator-dot"></div>
        <span class="indicator-text">Mão Detectada</span>
    </div>

    <!-- Painel de Controles -->
    <div id="painel-controles" role="group" aria-label="Controles de balanceamento">
        <div class="ajuste-container">
            <!-- Magnésio (Mg) -->
            <div class="controle-bloco">
                <span class="label-comp" style="color:#2ecc71;">Mg</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(0, -1)" aria-label="Diminuir coeficiente Mg">−</button>
                    <span id="c0" class="valor-coef" aria-label="Coeficiente Mg">1</span>
                    <button class="btn-seta" onclick="alterar(0, 1)" aria-label="Aumentar coeficiente Mg">+</button>
                </div>
            </div>

            <!-- Cloreto de Hidrogênio (HCl) -->
            <div class="controle-bloco">
                <span class="label-comp" style="color:#3498db;">HCl</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(1, -1)" aria-label="Diminuir coeficiente HCl">−</button>
                    <span id="c1" class="valor-coef" aria-label="Coeficiente HCl">1</span>
                    <button class="btn-seta" onclick="alterar(1, 1)" aria-label="Aumentar coeficiente HCl">+</button>
                </div>
            </div>

            <!-- Cloreto de Magnésio (MgCl₂) -->
            <div class="controle-bloco">
                <span class="label-comp" style="color:#10ac84;">MgCl₂</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(2, -1)" aria-label="Diminuir coeficiente MgCl₂">−</button>
                    <span id="c2" class="valor-coef" aria-label="Coeficiente MgCl₂">1</span>
                    <button class="btn-seta" onclick="alterar(2, 1)" aria-label="Aumentar coeficiente MgCl₂">+</button>
                </div>
            </div>

            <!-- Hidrogênio Molecular (H₂) -->
            <div class="controle-bloco">
                <span class="label-comp" style="color:#ecf0f1;">H₂</span>
                <div class="botoes-row">
                    <button class="btn-seta" onclick="alterar(3, -1)" aria-label="Diminuir coeficiente H₂">−</button>
                    <span id="c3" class="valor-coef" aria-label="Coeficiente H₂">1</span>
                    <button class="btn-seta" onclick="alterar(3, 1)" aria-label="Aumentar coeficiente H₂">+</button>
                </div>
            </div>
        </div>

        <!-- Botão Verificar -->
        <button id="btn-verificar" onclick="verificarGabarito()" aria-label="Verificar se o balanceamento está correto">
            ✓ Verificar Balanceamento
        </button>

        <!-- Botão Resetar (oculto por padrão) -->
        <button id="btn-resetar" onclick="resetarJogo()" class="btn-secundario" aria-label="Resetar para coeficientes iniciais" style="display: none;">
            ↻ Resetar
        </button>
    </div>

    <!-- Container A-Frame (Realidade Aumentada) -->
    <div id="canvas-container">
        <a-scene 
            embedded 
            vr-mode-ui="enabled: false" 
            device-orientation-permission-ui="enabled: false" 
            renderer="alpha: true; colorManagement: true; antialias: true;">
            
            <!-- Câmera Virtual -->
            <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

            <!-- Iluminação -->
            <a-light type="ambient" intensity="1" color="#ffffff"></a-light>
            <a-light 
                type="directional" 
                position="5 10 7" 
                intensity="0.6" 
                shadow="cast: true"
                light="castShadow: true">
            </a-light>

            <!-- Entidade Principal da Reação -->
            <a-entity id="filtro-reacao" position="0 0 -2.8" scale="0.35 0.35 0.35" visible="false">
                
                <!-- Reagente 1: Magnésio (Mg) -->
                <a-entity id="grupo-mg" position="-2.0 0 0"></a-entity>
                
                <!-- Operador: + (Mg + HCl) -->
                <a-entity position="-1.2 0 0" class="operador">
                    <a-box width="0.02" height="0.14" depth="0.02" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-box width="0.14" height="0.02" depth="0.02" color="#FFFFFF" material="shader: flat;"></a-box>
                </a-entity>

                <!-- Reagente 2: Ácido Clorídrico (HCl) -->
                <a-entity id="grupo-hcl" position="-0.4 0 0"></a-entity>

                <!-- Seta de Reação (→) -->
                <a-entity position="0.5 0 0" class="arrow">
                    <a-box position="-0.04 0 0" width="0.16" height="0.02" depth="0.02" color="#00CBC6" material="shader: flat;"></a-box>
                    <a-cone position="0.06 0 0" radius-bottom="0.05" height="0.08" color="#00CBC6" rotation="0 0 -90" material="shader: flat;"></a-cone>
                </a-entity>

                <!-- Produto 1: Cloreto de Magnésio (MgCl₂) -->
                <a-entity id="grupo-mgcl2" position="1.4 0 0"></a-entity>

                <!-- Operador: + (MgCl₂ + H₂) -->
                <a-entity position="2.2 0 0" class="operador">
                    <a-box width="0.02" height="0.14" depth="0.02" color="#FFFFFF" material="shader: flat;"></a-box>
                    <a-box width="0.14" height="0.02" depth="0.02" color="#FFFFFF" material="shader: flat;"></a-box>
                </a-entity>

                <!-- Produto 2: Hidrogênio Molecular (H₂) -->
                <a-entity id="grupo-h2" position="2.9 0 0"></a-entity>

            </a-entity>
        </a-scene>
    </div>

    <!-- Script Principal -->
    <script src="app.js"></script>
</body>
</html>
