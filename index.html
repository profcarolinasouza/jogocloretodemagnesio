<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo AR - Formação do Cloreto de Magnésio (Nativo)</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #000; }
        
        /* Força o vídeo a ocupar todo o ecrã no fundo */
        video { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            object-fit: cover; 
            z-index: 0; 
            transform: scaleX(-1); 
        }
        
        #canvas-container { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
        }
        
        #hud-jogo {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9); color: white; padding: 12px 25px;
            border-radius: 15px; text-align: center; z-index: 10; width: 85%; max-width: 540px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #444;
        }
        h2 { margin: 0 0 5px 0; font-size: 18px; color: #00cbc6; }
        p { margin: 0; font-size: 13px; color: #bbb; }

        #painel-controles {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px;
            width: 95%; max-width: 520px;
        }

        .ajuste-container {
            display: flex; justify-content: space-between; width: 100%; background: rgba(0,0,0,0.8);
            padding: 8px; border-radius: 12px; border: 1px solid #444;
        }

        .controle-bloco { display: flex; flex-direction: column; align-items: center; color: white; width: 24%; }
        .label-comp { font-size: 12px; font-weight: bold; margin-bottom: 4px; text-align: center; }
        .botoes-row { display: flex; align-items: center; gap: 4px; }
        
        .btn-seta {
            background: #444; color: white; border: 1px solid #666; width: 26px; height: 26px;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-seta:active { background: #00cbc6; }
        .valor-coef { font-size: 16px; font-weight: bold; min-width: 14px; text-align: center; }

        #btn-verificar {
            background: #218c74; color: white; border: none; padding: 12px 35px;
            font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 80%;
        }

        #feedback-popup {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            padding: 20px 30px; border-radius: 15px; color: white; font-weight: bold; text-align: center;
            z-index: 20; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 18px;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>

    <div id="hud-jogo">
        <h2>Balanço Químico: Mg + HCl → MgCl₂ + H₂</h2>
        <p>Identifique os elementos: Verde (Mg), Azul (Cl) e Branco (H)!</p>
    </div>

    <div id="feedback-popup"></div>

    <div id="painel-controles">
